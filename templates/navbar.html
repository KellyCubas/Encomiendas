<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="{% url 'dashboard' %}">
      <i class="fas fa-shipping-fast me-2"></i>Encomiendas
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarMain">
      {% if user.is_authenticated %}
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'dashboard' %}">Dashboard <span class="badge bg-secondary">{{ nav_activas }}</span></a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'encomienda_lista' %}">
            Encomiendas
            {% if nav_retraso > 0 %}
            <span class="badge bg-danger rounded-pill">{{ nav_retraso }}</span>
            {% endif %}
          </a>
        </li>
        <li class="nav-item"><a class="nav-link" href="{% url 'encomienda_crear' %}">Nueva</a></li>
      </ul>
      <span class="navbar-text me-3">
        {{ user.username }}
        {% if nav_pendientes %}<span class="badge bg-light text-primary ms-2">{{ nav_pendientes }}</span>{% endif %}
      </span>
      <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button class="btn btn-outline-light btn-sm" type="submit">Salir</button>
      </form>
      {% else %}
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Iniciar sesion</a></li>
      </ul>
      {% endif %}
    </div>
  </div>
</nav>
