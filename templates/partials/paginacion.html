{% if encomiendas.has_other_pages %}
<nav class="mt-3">
  <ul class="pagination justify-content-center mb-0">
    {% if encomiendas.has_previous %}
    <li class="page-item">
      <a class="page-link" href="?page={{ encomiendas.previous_page_number }}&q={{ q }}&estado={{ estado_activo }}">Anterior</a>
    </li>
    {% endif %}
    <li class="page-item active">
      <span class="page-link">{{ encomiendas.number }} de {{ encomiendas.paginator.num_pages }}</span>
    </li>
    {% if encomiendas.has_next %}
    <li class="page-item">
      <a class="page-link" href="?page={{ encomiendas.next_page_number }}&q={{ q }}&estado={{ estado_activo }}">Siguiente</a>
    </li>
    {% endif %}
  </ul>
</nav>
{% endif %}
