{% extends 'base.html' %}

{% block title %}Iniciar Sesion - Encomiendas{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="text-center mb-4">
      <i class="fas fa-box-open fa-4x text-primary mb-3"></i>
      <h2>Sistema de Encomiendas</h2>
      <p class="text-muted">Ingresa tus credenciales para continuar</p>
    </div>
    <div class="card shadow">
      <div class="card-body p-4">
        {% if form.errors %}
        <div class="alert alert-danger">Usuario o contrasena incorrectos</div>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" name="username" class="form-control" placeholder="Tu usuario" required autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label">Contrasena</label>
            <input type="password" name="password" class="form-control" placeholder="Tu contrasena" required>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">Iniciar Sesion</button>
          </div>
          <input type="hidden" name="next" value="{{ next }}">
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
